{% extends "base.html" %}
{% block content %}
    <h1>Welcome to Your Secure Password Manager</h1>
    <p>Store all your passwords encrypted, generate strong ones, and access them easily.</p>
    {% if not session.user_id %}
        <p><a href="{{ url_for('register') }}">Get Started – Register</a> | 
           <a href="{{ url_for('login') }}">Login</a></p>
    {% else %}
        <p><a href="{{ url_for('dashboard') }}">Go to Dashboard</a></p>
    {% endif %}
{% endblock %}
