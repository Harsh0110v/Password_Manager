{% extends "base.html" %}
{% block content %}
    <h1>Welcome, {{ username }}!</h1>
    <p style="margin-bottom: 20px;">
        <a href="{{ url_for('add_entry') }}" style="display: inline-block; background: #667eea; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none;">+ Add New Password</a>
    </p>
    {% if entries %}
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px;">
            {% for entry in entries %}
                <div style="background: #f8f9fa; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s;">
                    <h3 style="margin-bottom: 8px; color: #2c3e50;">{{ entry.site_name }}</h3>
                    <p style="color: #666; font-size: 0.9rem;">{{ entry.site_url or 'No URL' }}</p>
                    <div style="margin-top: 12px;">
                        <a href="{{ url_for('view_entry', entry_id=entry.id) }}" style="margin-right: 10px;">View</a>
                        <a href="{{ url_for('edit_entry', entry_id=entry.id) }}" style="margin-right: 10px;">Edit</a>
                        <form action="{{ url_for('delete_entry', entry_id=entry.id) }}" method="POST" style="display:inline;">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" onclick="return confirm('Delete this entry?')" style="background: #e74c3c; padding: 5px 12px; font-size: 0.9rem;">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No saved passwords yet.</p>
    {% endif %}
{% endblock %}
