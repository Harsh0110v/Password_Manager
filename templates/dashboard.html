{% extends "base.html" %}
{% block content %}
    <h1>Welcome, {{ username }}!</h1>
    <p><a href="{{ url_for('add_entry') }}">+ Add New Password</a></p>
    <hr>
    {% if entries %}
        <ul>
        {% for entry in entries %}
            <li>
                <strong>{{ entry.site_name }}</strong>
                ({{ entry.site_url or 'no url' }})
                <a href="{{ url_for('view_entry', entry_id=entry.id) }}">View</a>
                <a href="{{ url_for('edit_entry', entry_id=entry.id) }}">Edit</a>
                <form action="{{ url_for('delete_entry', entry_id=entry.id) }}" method="POST" style="display:inline;">
                    <button type="submit" onclick="return confirm('Delete this entry?')">Delete</button>
                </form>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No saved passwords yet.</p>
    {% endif %}
{% endblock %}
